<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Garden — MVP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar center">
    <div class="brand">The Garden</div>
    <div class="spacer"></div>
    <div id="userIcon" class="userIcon hidden">U</div>
  </header>

  <main class="layout">
    <!-- LOGIN ONLY -->
    <section id="loginPanel" class="panel narrow">
      <h2>Welcome</h2>
      <div class="field">
        <label>Email</label>
        <input id="authEmail" type="email" placeholder="you@email.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="authPassword" type="password" placeholder="••••••••" />
      </div>
      <div class="actions">
        <button id="signUpBtn" class="primary">Sign up</button>
        <button id="signInBtn" class="ghost">Log in</button>
      </div>
      <div id="authStatus" class="hint">Not signed in</div>
    </section>

    <!-- QUESTION AFTER LOGIN -->
    <section id="questionPanel" class="panel hidden narrow">
      <h2>Name 1 thing you love</h2>
      <div class="field">
        <input id="questionInput" type="text" placeholder="e.g., music" />
      </div>
      <div class="actions">
        <button id="voiceBtn" class="ghost">🎙️ Voice</button>
        <button id="submitQuestionBtn" class="primary">Enter</button>
      </div>
      <div id="questionStatus" class="hint"></div>
    </section>

    <!-- MAIN APP AFTER SUBMIT -->
    <section id="mainPanel" class="panel wide hidden">
      <div class="split">
        <div class="col">
          <h3>Subject Chat</h3>
          <div id="chatArea" class="card">Ask, explore, and refine the subject here.</div>
        </div>
        <div class="col">
          <h3>Info Card</h3>
          <div id="infoCard" class="card">Your subject’s structured card will appear here.</div>

          <h3 class="mt">Related Nodes</h3>
          <div id="relatedNodes" class="related">
            <div class="chip">(coming soon)</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
